<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Shop Business Risk Assessment Questionnaire</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
      position: relative;
    }
    .lang-switcher {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }
    .lang-button {
      background: #4CAF50;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .lang-button:hover {
      background: #45a049;
    }
    .form-container {
      background: #fff;
      padding: 2rem;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      margin-top: 2rem;
    }
    h2 {
      color: #333;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: bold;
    }
    input[type="text"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    textarea {
      height: 100px;
      resize: vertical;
    }
    .btn {
      display: inline-block;
      background: #4CAF50;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #45a049;
    }
    .section {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #eee;
    }
    .section:last-child {
      border-bottom: none;
    }
  </style>
  <script src="lang.js"></script>
</head>
<body>
  <header>
    <div class="lang-switcher">
      <button id="lang-button" class="lang-button">中文</button>
    </div>
    <h1>Coffee Shop Business Risk Assessment Questionnaire</h1>
  </header>
  
  <div class="container">
    <div class="form-container">
      <form action="/api/analyze" method="POST">
        <input type="hidden" id="lang" name="lang" value="en">
        <!-- 基本信息 -->
        <div class="section">
          <h2>Basic Information</h2>
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required>
          </div>
          <div class="form-group">
            <label for="location">Planned Store Location</label>
            <input type="text" id="location" name="location" required>
          </div>
          <div class="form-group">
            <label for="storeSize">Store Area (square meters)</label>
            <input type="number" id="storeSize" name="storeSize" min="10" max="500" required>
          </div>
          <div class="form-group">
            <label for="budget">Startup Budget (10,000 yuan)</label>
            <input type="number" id="budget" name="budget" min="10" max="500" required>
          </div>
          <div class="form-group">
            <label for="openingTime">Planned Opening Time</label>
            <input type="text" id="openingTime" name="openingTime" placeholder="e.g., June 2024" required>
          </div>
        </div>
        
        <!-- 市场分析 -->
        <div class="section">
          <h2>Market Analysis</h2>
          <div class="form-group">
            <label for="marketResearch">Have you conducted market research?</label>
            <select id="marketResearch" name="marketResearch" required>
              <option value="">Please select</option>
              <option value="yes">Yes, detailed research</option>
              <option value="partial">Partial research</option>
              <option value="no">No, no research</option>
            </select>
          </div>
          <div class="form-group">
            <label for="targetAudience">Target Customer Group</label>
            <textarea id="targetAudience" name="targetAudience" required></textarea>
          </div>
          <div class="form-group">
            <label for="competition">Surrounding Competition</label>
            <textarea id="competition" name="competition" required></textarea>
          </div>
          <div class="form-group">
            <label for="productPositioning">Product Positioning</label>
            <select id="productPositioning" name="productPositioning" required>
              <option value="">Please select</option>
              <option value="premium">High-end specialty coffee</option>
              <option value="midRange">Mid-range quality coffee</option>
              <option value="budget">Affordable quick coffee</option>
              <option value="specialty">Themed specialty coffee</option>
            </select>
          </div>
          <div class="form-group">
            <label for="marketTrends">Your understanding of current coffee market trends</label>
            <textarea id="marketTrends" name="marketTrends" required></textarea>
          </div>
        </div>
        
        <!-- 运营管理 -->
        <div class="section">
          <h2>Operation Management</h2>
          <div class="form-group">
            <label for="industryExperience">Coffee industry experience</label>
            <select id="industryExperience" name="industryExperience" required>
              <option value="">Please select</option>
              <option value="moreThan5">More than 5 years</option>
              <option value="1-5">1-5 years</option>
              <option value="lessThan1">Less than 1 year</option>
              <option value="none">None</option>
            </select>
          </div>
          <div class="form-group">
            <label for="coffeeSkills">Coffee making skill level</label>
            <select id="coffeeSkills" name="coffeeSkills" required>
              <option value="">Please select</option>
              <option value="expert">Expert level (Q-Grader certified)</option>
              <option value="advanced">Advanced (professional training)</option>
              <option value="intermediate">Intermediate (basic skills)</option>
              <option value="beginner">Beginner (basic understanding)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="equipment">Equipment configuration plan</label>
            <textarea id="equipment" name="equipment" required></textarea>
          </div>
          <div class="form-group">
            <label for="staffing">Staffing plan</label>
            <textarea id="staffing" name="staffing" required></textarea>
          </div>
          <div class="form-group">
            <label for="suppliers">Supplier resources</label>
            <select id="suppliers" name="suppliers" required>
              <option value="">Please select</option>
              <option value="secured">Confirmed</option>
              <option value="inProgress">In negotiation</option>
              <option value="notStarted">Not started yet</option>
            </select>
          </div>
          <div class="form-group">
            <label for="marketingStrategy">Marketing strategy</label>
            <textarea id="marketingStrategy" name="marketingStrategy" required></textarea>
          </div>
        </div>
        
        <!-- 财务规划 -->
        <div class="section">
          <h2>Financial Planning</h2>
          <div class="form-group">
            <label for="revenueProjection">Monthly revenue expectation (10,000 yuan)</label>
            <input type="number" id="revenueProjection" name="revenueProjection" min="1" max="100" required>
          </div>
          <div class="form-group">
            <label for="costStructure">Cost structure</label>
            <textarea id="costStructure" name="costStructure" required></textarea>
          </div>
          <div class="form-group">
            <label for="pricingStrategy">Pricing strategy</label>
            <textarea id="pricingStrategy" name="pricingStrategy" required></textarea>
          </div>
          <div class="form-group">
            <label for="breakEven">Expected break-even point (months)</label>
            <input type="number" id="breakEven" name="breakEven" min="1" max="36" required>
          </div>
          <div class="form-group">
            <label for="cashFlow">Cash flow planning</label>
            <textarea id="cashFlow" name="cashFlow" required></textarea>
          </div>
          <div class="form-group">
            <label for="fundingSources">Funding sources</label>
            <textarea id="fundingSources" name="fundingSources" required></textarea>
          </div>
        </div>
        
        <!-- 风险认知 -->
        <div class="section">
          <h2>Risk Awareness</h2>
          <div class="form-group">
            <label for="mainRisks">What do you think are the main risks?</label>
            <textarea id="mainRisks" name="mainRisks" required></textarea>
          </div>
          <div class="form-group">
            <label for="riskMitigation">Risk response measures</label>
            <textarea id="riskMitigation" name="riskMitigation" required></textarea>
          </div>
        </div>
        
        <button type="submit" class="btn">Submit Assessment</button>
      </form>
    </div>
  </div>
</body>
</html>
