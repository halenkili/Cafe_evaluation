<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>咖啡创业风险评估平台</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
      position: relative;
    }
    .lang-switcher {
      position: absolute;
      top: 1rem;
      right: 1rem;
    }
    .lang-button {
      background: #4CAF50;
      color: #fff;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .lang-button:hover {
      background: #45a049;
    }
    .hero {
      background: #6f4e37;
      color: #fff;
      padding: 3rem 1rem;
      text-align: center;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: #4CAF50;
      color: #fff;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 1rem;
      transition: background 0.3s;
    }
    .btn:hover {
      background: #45a049;
    }
    .features {
      display: flex;
      justify-content: space-around;
      margin: 2rem 0;
    }
    .feature {
      background: #fff;
      padding: 1.5rem;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      flex: 1;
      margin: 0 10px;
      text-align: center;
    }
    footer {
      background: #333;
      color: #fff;
      text-align: center;
      padding: 1rem;
      margin-top: 2rem;
    }
  </style>
  <script src="lang.js"></script>
</head>
<body>
  <header>
    <div class="lang-switcher">
      <button id="lang-button" class="lang-button">English</button>
    </div>
    <h1>咖啡创业风险评估平台</h1>
  </header>
  
  <div class="hero">
    <div class="container">
      <h2>评估您的咖啡创业风险</h2>
      <p>通过AI分析，获取定制化的创业风险评估报告，助您做出明智的商业决策</p>
      <a href="/questionnaire-zh.html" class="btn">开始评估</a>
    </div>
  </div>
  
  <div class="container">
    <h2>我们的服务</h2>
    <div class="features">
      <div class="feature">
        <h3>专业评估</h3>
        <p>基于行业数据和AI分析，提供专业的风险评估</p>
      </div>
      <div class="feature">
        <h3>定制化报告</h3>
        <p>根据您的具体情况，生成个性化的分析报告</p>
      </div>
      <div class="feature">
        <h3>改进建议</h3>
        <p>针对风险点，提供具体的改进建议和解决方案</p>
      </div>
    </div>
  </div>
  
  <footer>
    <p>&copy; 2026 咖啡创业风险评估平台</p>
  </footer>
</body>
</html>
